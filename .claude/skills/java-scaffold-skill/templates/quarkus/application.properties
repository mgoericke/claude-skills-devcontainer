# ── Datasource / PostgreSQL ───────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=app
quarkus.datasource.password=app
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/{{ARTIFACT_ID}}db

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# ── RabbitMQ (SmallRye Reactive Messaging) ────────────────────────────────────
# Globale Broker-Verbindung – gilt für alle Channels
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=app
rabbitmq-password=app

# Incoming: Queue → Anwendung
# Java: @Incoming("{{CHANNEL_IN}}") @Blocking @Transactional public void handle(...)
mp.messaging.incoming.{{CHANNEL_IN}}.connector=smallrye-rabbitmq
mp.messaging.incoming.{{CHANNEL_IN}}.queue.name={{ARTIFACT_ID}}-queue
mp.messaging.incoming.{{CHANNEL_IN}}.exchange.name={{ARTIFACT_ID}}-exchange

# Outgoing: Anwendung → Exchange
# Java: @Channel("{{CHANNEL_OUT}}") Emitter<String> emitter;
mp.messaging.outgoing.{{CHANNEL_OUT}}.connector=smallrye-rabbitmq
mp.messaging.outgoing.{{CHANNEL_OUT}}.exchange.name={{ARTIFACT_ID}}-exchange

# ── Dev Services deaktivieren (echte Services via Docker Compose) ─────────────
# WICHTIG: pro Extension deaktivieren – quarkus.devservices.enabled greift NICHT für RabbitMQ
quarkus.rabbitmq.devservices.enabled=false
quarkus.datasource.devservices.enabled=false

# ── HTTP ──────────────────────────────────────────────────────────────────────
quarkus.http.port=8080

# ── Health Check ──────────────────────────────────────────────────────────────
# PFLICHT – wird vom Dockerfile HEALTHCHECK und Docker Compose genutzt
# Endpunkte: /q/health  /q/health/live  /q/health/ready
quarkus.smallrye-health.ui.enable=true
quarkus.smallrye-health.liveness-path=/q/health/live
quarkus.smallrye-health.readiness-path=/q/health/ready

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
# Dependency: io.quarkus:quarkus-smallrye-openapi
# Swagger UI:  http://localhost:8080/q/swagger-ui
# API-Docs:    http://localhost:8080/q/openapi
# always-include=true → Swagger UI auch im Produktions-Modus verfügbar (nicht nur dev)
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."{{GROUP_ID}}".level=DEBUG
