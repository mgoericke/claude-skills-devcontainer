spring.application.name={{ARTIFACT_ID}}

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/{{ARTIFACT_ID}}db
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── RabbitMQ ──────────────────────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=app
spring.rabbitmq.password=app

# ── Actuator / Health Check ───────────────────────────────────────────────────
# Health-Endpunkt ist PFLICHT – wird vom Dockerfile HEALTHCHECK und Docker Compose genutzt
management.endpoints.web.exposure.include=health,info,metrics,readiness,liveness
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ── RabbitMQ Queue / Exchange ─────────────────────────────────────────────────
# Wird von @RabbitListener(queues = "${rabbitmq.queue.<entity>}") verwendet
# rabbitmq.queue.{{ARTIFACT_ID}}={{ARTIFACT_ID}}-queue

# ── CORS ──────────────────────────────────────────────────────────────────────
# Globale CORS-Konfiguration (alternativ: @CrossOrigin pro Controller oder CorsConfig.java)
# spring.mvc.cors.allowed-origins=http://localhost:3000
# spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
# spring.mvc.cors.allowed-headers=*
# spring.mvc.cors.max-age=3600

# ── Caching ───────────────────────────────────────────────────────────────────
# Standard: SimpleCacheManager (In-Memory). Für Redis: spring.cache.type=redis
# spring.cache.type=simple

# ── File Upload ───────────────────────────────────────────────────────────────
# spring.servlet.multipart.max-file-size=10MB
# spring.servlet.multipart.max-request-size=128MB

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
# Dependency: org.springdoc:springdoc-openapi-starter-webmvc-ui (Version vor Generierung prüfen)
# Swagger UI:  http://localhost:8080/swagger-ui.html
# API-Docs:    http://localhost:8080/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
# Actuator-Endpunkte in der API-Doku ausblenden
springdoc.show-actuator=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.{{GROUP_ID}}=DEBUG
logging.level.org.springframework=INFO
