spring.application.name={{ARTIFACT_ID}}

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/{{ARTIFACT_ID}}db
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── RabbitMQ ──────────────────────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=app
spring.rabbitmq.password=app

# ── Actuator / Health Check ───────────────────────────────────────────────────
# Health-Endpunkt ist PFLICHT – wird vom Dockerfile HEALTHCHECK und Docker Compose genutzt
management.endpoints.web.exposure.include=health,info,metrics,readiness,liveness
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.{{GROUP_ID}}=DEBUG
logging.level.org.springframework=INFO
