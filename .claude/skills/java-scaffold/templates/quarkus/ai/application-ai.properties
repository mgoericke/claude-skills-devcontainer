# Co-Author: Claude (claude-sonnet-4-6, Anthropic)
#
# ── LangChain4j – LLM Provider ──────────────────────────────────────────────
# Choose ONE provider and comment out the others.
# Versions of the quarkus-langchain4j extensions are included in the Quarkus BOM.

# ── Option A: OpenAI (or OpenAI-compatible API like vLLM, LM Studio) ───────
# Dependency: io.quarkiverse.langchain4j:quarkus-langchain4j-openai
# API key via environment variable: QUARKUS_LANGCHAIN4J_OPENAI_API_KEY
quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY:demo}
quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
quarkus.langchain4j.openai.chat-model.temperature=0.7
quarkus.langchain4j.openai.timeout=30s
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# ── Option B: Ollama (local, no API key required) ───────────────────────────
# Dependency: io.quarkiverse.langchain4j:quarkus-langchain4j-ollama
#quarkus.langchain4j.ollama.base-url=http://localhost:11434
#quarkus.langchain4j.ollama.chat-model.model-id=llama3.2
#quarkus.langchain4j.ollama.chat-model.temperature=0.7
#quarkus.langchain4j.ollama.timeout=60s
#quarkus.langchain4j.ollama.log-requests=true
#quarkus.langchain4j.ollama.log-responses=true
# Disable Dev Services (own Ollama container via Docker Compose)
#quarkus.langchain4j.ollama.devservices.enabled=false

# ── Option C: Anthropic (Claude) ────────────────────────────────────────────
# Dependency: io.quarkiverse.langchain4j:quarkus-langchain4j-anthropic
#quarkus.langchain4j.anthropic.api-key=${ANTHROPIC_API_KEY:}
#quarkus.langchain4j.anthropic.chat-model.model-name=claude-sonnet-4-6
#quarkus.langchain4j.anthropic.chat-model.temperature=0.7
#quarkus.langchain4j.anthropic.chat-model.max-tokens=4096
#quarkus.langchain4j.anthropic.timeout=30s
#quarkus.langchain4j.anthropic.log-requests=true
#quarkus.langchain4j.anthropic.log-responses=true

# ── RAG – PgVector (vector database for embeddings) ────────────────────────
# Dependency: io.quarkiverse.langchain4j:quarkus-langchain4j-pgvector
# Uses the same PostgreSQL database – PgVector extension must be installed
# Dimension 1536 = OpenAI text-embedding-ada-002; 384 = Ollama nomic-embed-text
#quarkus.langchain4j.pgvector.dimension=1536
#quarkus.langchain4j.pgvector.drop-table-first=false

# ── Guardrails ──────────────────────────────────────────────────────────────
# Max retries on output guardrail violation (default: 3)
#quarkus.langchain4j.guardrails.max-retries=3

# ── Observability ───────────────────────────────────────────────────────────
# Request/response logging is configured above at the provider level
# For OpenTelemetry tracing:
# Dependency: io.quarkus:quarkus-opentelemetry
#quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
