spring.application.name=product-service

# ── PostgreSQL ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/product-servicedb
spring.datasource.username=app
spring.datasource.password=app
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Actuator / Health Check ───────────────────────────────────────────────────
# Health-Endpunkt ist PFLICHT – wird vom Dockerfile HEALTHCHECK und Docker Compose genutzt
management.endpoints.web.exposure.include=health,info,metrics,readiness,liveness
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ── OpenAPI / Swagger UI ──────────────────────────────────────────────────────
# Swagger UI:  http://localhost:8080/swagger-ui.html
# API-Docs:    http://localhost:8080/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.show-actuator=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.de.javamark=DEBUG
logging.level.org.springframework=INFO
